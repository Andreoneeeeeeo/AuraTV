name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add iOS Platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Build iOS App
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Verify App
        run: |
          ls -lah ios/App/build/Build/Products/Release-iphoneos/
          du -sh ios/App/build/Build/Products/Release-iphoneos/App.app

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          cd Payload
          zip -r ../AuraTV.ipa .
          cd ..

      - name: Verify IPA
        run: |
          ls -lh AuraTV.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AuraTV-iOS
          path: AuraTV.ipa
